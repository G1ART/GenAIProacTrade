<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>METIS — Private Beta Sign-in</title>
  <link rel="stylesheet" href="/static/product_shell.css" />
  <link rel="stylesheet" href="/static/login.css" />
</head>
<body class="ps-app-root">
  <main class="lg-shell" id="lg-shell">
    <section class="lg-card" aria-labelledby="lg-title">
      <header class="lg-header">
        <div class="lg-brand">METIS</div>
        <div class="lg-sub">Private Beta</div>
      </header>

      <h1 id="lg-title" class="lg-title">
        <span data-lang="ko">보안 로그인</span>
        <span data-lang="en">Secure sign-in</span>
      </h1>
      <p class="lg-copy">
        <span data-lang="ko">초대된 이메일로 매직 링크를 보내 드립니다. 링크를 클릭하면 이 창으로 돌아와 로그인됩니다.</span>
        <span data-lang="en">We'll email you a one-time magic link. Click it, come back to this tab, and you're in.</span>
      </p>

      <form id="lg-form" class="lg-form" autocomplete="email" novalidate>
        <label class="lg-label" for="lg-email">
          <span data-lang="ko">이메일</span><span data-lang="en">Email</span>
        </label>
        <input
          id="lg-email"
          class="lg-input"
          type="email"
          inputmode="email"
          placeholder="you@your-company.com"
          required
          autocomplete="email"
          spellcheck="false"
        />

        <button id="lg-submit" class="lg-cta" type="submit" disabled>
          <span data-lang="ko">보안 로그인 링크 보내기</span>
          <span data-lang="en">Send secure sign-in link</span>
        </button>
      </form>

      <p id="lg-status" class="lg-status" role="status" aria-live="polite"></p>

      <footer class="lg-footer">
        <div class="lg-footer-row">
          <a class="lg-link" href="#" id="lg-lang-toggle">
            <span data-lang="ko">English</span>
            <span data-lang="en">한국어</span>
          </a>
          <div class="lg-footer-note">
            <span data-lang="ko">문제가 있나요? 초대해 준 담당자에게 문의해 주세요.</span>
            <span data-lang="en">Stuck? Ping the teammate who invited you.</span>
          </div>
        </div>
      </footer>
    </section>
  </main>

  <!-- ESM module — supabase-js from CDN. The only external script in the stack. -->
  <script type="module" src="/static/login.js"></script>
</body>
</html>
